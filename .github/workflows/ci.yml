name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-checks:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web
        run: pnpm --filter web run lint

      - name: Typecheck web
        run: pnpm --filter web run typecheck

      - name: Test web
        run: pnpm --filter web run test -- --run

  api-checks:
    name: API checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api
        run: pnpm --filter api run build

      - name: Typecheck api
        run: pnpm --filter api run typecheck

      - name: Test api
        run: pnpm --filter api run test -- --run

